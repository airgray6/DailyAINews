name: 每日AI资讯推送

on:
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = 北京时间 07:00
  workflow_dispatch:

permissions:
  contents: write  # 允许推送 docs 目录到仓库

jobs:
  push-news:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests lunarcalendar

      - name: 执行推送脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python DailyAINews.py
